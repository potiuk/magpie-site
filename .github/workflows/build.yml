name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # needed to push the built site to the `publish` branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync docs from apache/magpie
        env:
          MAGPIE_DOCS_REPO: https://github.com/apache/magpie.git
          MAGPIE_DOCS_BRANCH: main
        run: npm run sync-docs

      - name: Type check
        run: npx astro check
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Publish site to "publish" branch
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Carry the ASF publish config into the generated branch so infra
          # serves it at https://magpie.apache.org/ (whoami: publish).
          cp .asf.yaml dist/.asf.yaml
          cd dist
          git init -q
          git checkout -q -b publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publish site (${GITHUB_SHA::7})"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" publish
